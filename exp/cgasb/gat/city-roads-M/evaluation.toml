function = "bin.cgasb.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false
amp_dtype = "bfloat16"

[base_config.optimizer]
type = "AdamW"
lr = 0.003645000274067184
weight_decay = 0.11478001516377274

[base_config.data]
path = "data/city-roads-M"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = true

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gat"
n_blocks = 2
d_hidden = 512
dropout = 0.45
pre_linear = true
res = true
norm = "none"
log2_n_heads = 2
