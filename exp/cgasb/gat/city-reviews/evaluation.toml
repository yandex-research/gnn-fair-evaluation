function = "bin.cgasb.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false
amp_dtype = "bfloat16"

[base_config.optimizer]
type = "AdamW"
lr = 0.00016482384978990465
weight_decay = 0.6208122536575985

[base_config.data]
path = "data/city-reviews"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = false

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gat"
n_blocks = 4
d_hidden = 768
dropout = 0.05
pre_linear = true
res = true
norm = "none"
log2_n_heads = 3
