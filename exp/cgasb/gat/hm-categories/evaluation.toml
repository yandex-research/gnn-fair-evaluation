function = "bin.cgasb.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false

[base_config.optimizer]
type = "AdamW"
lr = 0.0005181903945538307
weight_decay = 0.00081219163433154

[base_config.data]
path = "data/hm-categories"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = false

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gat"
n_blocks = 3
d_hidden = 128
dropout = 0.2
pre_linear = true
res = false
norm = "bn"
log2_n_heads = 2
