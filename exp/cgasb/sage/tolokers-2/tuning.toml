seed = 0
function = "bin.cgasb.main"
n_trials = 100

[sampler]
n_startup_trials = 25

[space]
seed = 0
n_steps = 3000
patience = 1000
save_checkpoint = false
amp_dtype = "bfloat16"

[space.optimizer]
type = "AdamW"
lr = [
    "_tune_",
    "loguniform",
    3e-05,
    0.01,
]
weight_decay = [
    "_tune_",
    "loguniform",
    0.0001,
    1.0,
]

[space.data]
path = "data/tolokers-2"
setting = "transductive"
internal_split_name = "RL"

[space.transform]
seed = 0
labels = false

[space.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[space.model.backbone]
conv = "sage"
n_blocks = [
    "_tune_",
    "int",
    1,
    10,
    1,
]
d_hidden = [
    "_tune_",
    "int",
    96,
    768,
    32,
]
dropout = [
    "_tune_",
    "discrete_uniform",
    0.0,
    0.5,
    0.05,
]
pre_linear = [
    "_tune_",
    "categorical",
    [
        false,
        true,
    ],
]
res = [
    "_tune_",
    "categorical",
    [
        false,
        true,
    ],
]
norm = [
    "_tune_",
    "categorical",
    [
        "none",
        "ln",
        "bn",
    ],
]
