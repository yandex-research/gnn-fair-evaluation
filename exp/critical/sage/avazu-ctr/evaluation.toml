function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false

[base_config.optimizer]
type = "AdamW"
lr = 0.00033599723695690596
weight_decay = 0.7737101705644303

[base_config.data]
path = "data/avazu-ctr"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = true

[base_config.transform.features]
frac_policy = "quantile-normal"
impute_first = true

[base_config.model.backbone]
conv = "sage"
n_blocks = 2
d_hidden = 224
dropout = 0.2
log2_hidden_dim_multiplier = 2
normalization = "BatchNorm"
