function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false

[base_config.optimizer]
type = "AdamW"
lr = 0.0010423304284166198
weight_decay = 0.4278286527133363

[base_config.data]
path = "data/twitch-views"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = true

[base_config.transform.features]
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "sage"
n_blocks = 10
d_hidden = 96
dropout = 0.15000000000000002
log2_hidden_dim_multiplier = 1
normalization = "LayerNorm"
