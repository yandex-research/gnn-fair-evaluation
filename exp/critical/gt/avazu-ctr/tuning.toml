seed = 0
function = "bin.critical.main"
n_trials = 100

[sampler]
n_startup_trials = 25

[space]
seed = 0
n_steps = 3000
patience = 1000
save_checkpoint = false

[space.optimizer]
type = "AdamW"
lr = [
    "_tune_",
    "loguniform",
    3e-05,
    0.01,
]
weight_decay = [
    "_tune_",
    "loguniform",
    0.0001,
    1.0,
]

[space.data]
path = "data/avazu-ctr"
setting = "transductive"
internal_split_name = "RL"

[space.transform]
seed = 0
labels = true

[space.transform.features]
frac_policy = "quantile-normal"
impute_first = true

[space.model.backbone]
conv = "gt"
n_blocks = [
    "_tune_",
    "int",
    1,
    10,
    1,
]
d_hidden = [
    "_tune_",
    "int",
    96,
    768,
    32,
]
dropout = [
    "_tune_",
    "discrete_uniform",
    0.0,
    0.5,
    0.05,
]
log2_hidden_dim_multiplier = [
    "_tune_",
    "int",
    0,
    2,
    1,
]
normalization = [
    "_tune_",
    "categorical",
    [
        "LayerNorm",
        "BatchNorm",
        "Identity",
    ],
]
log2_n_heads = [
    "_tune_",
    "int",
    1,
    3,
    1,
]
sep = [
    "_tune_",
    "categorical",
    [
        false,
        true,
    ],
]
