function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false

[base_config.optimizer]
type = "AdamW"
lr = 0.0002084617426365759
weight_decay = 0.05633883320154013

[base_config.data]
path = "data/twitch-views"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = true

[base_config.transform.features]
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gt"
n_blocks = 10
d_hidden = 96
dropout = 0.25
log2_hidden_dim_multiplier = 0
normalization = "Identity"
log2_n_heads = 3
sep = false
