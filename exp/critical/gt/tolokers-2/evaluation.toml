function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false
amp_dtype = "bfloat16"

[base_config.optimizer]
type = "AdamW"
lr = 0.0008894982583071786
weight_decay = 0.006220609350094664

[base_config.data]
path = "data/tolokers-2"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = false

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gt"
n_blocks = 9
d_hidden = 224
dropout = 0.30000000000000004
log2_hidden_dim_multiplier = 1
normalization = "Identity"
log2_n_heads = 3
sep = true
