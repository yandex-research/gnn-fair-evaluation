function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false

[base_config.optimizer]
type = "AdamW"
lr = 0.00015568095089439705
weight_decay = 0.006742968397078573

[base_config.data]
path = "data/hm-prices"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = true

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gcn"
n_blocks = 4
d_hidden = 224
dropout = 0.05
log2_hidden_dim_multiplier = 2
normalization = "LayerNorm"
