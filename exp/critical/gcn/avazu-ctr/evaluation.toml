function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false

[base_config.optimizer]
type = "AdamW"
lr = 0.0029084242919906844
weight_decay = 0.023904789841108925

[base_config.data]
path = "data/avazu-ctr"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = true

[base_config.transform.features]
frac_policy = "quantile-normal"
impute_first = true

[base_config.model.backbone]
conv = "gcn"
n_blocks = 6
d_hidden = 96
dropout = 0.0
log2_hidden_dim_multiplier = 1
normalization = "LayerNorm"
