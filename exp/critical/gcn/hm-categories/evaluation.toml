function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false

[base_config.optimizer]
type = "AdamW"
lr = 0.0006000678512312459
weight_decay = 0.0003842819069961293

[base_config.data]
path = "data/hm-categories"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = false

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gcn"
n_blocks = 10
d_hidden = 192
dropout = 0.15000000000000002
log2_hidden_dim_multiplier = 0
normalization = "LayerNorm"
