function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false
amp_dtype = "bfloat16"

[base_config.optimizer]
type = "AdamW"
lr = 0.00018633662608958027
weight_decay = 0.00020372400462527365

[base_config.data]
path = "data/artnet-exp"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = false

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gat"
n_blocks = 9
d_hidden = 192
dropout = 0.5
log2_hidden_dim_multiplier = 0
normalization = "Identity"
log2_n_heads = 1
sep = true
