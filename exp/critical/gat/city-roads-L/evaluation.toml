function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false
amp_dtype = "bfloat16"

[base_config.optimizer]
type = "AdamW"
lr = 0.0001629278724755556
weight_decay = 0.0026526985759349085

[base_config.data]
path = "data/city-roads-L"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = true

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gat"
n_blocks = 10
d_hidden = 256
dropout = 0.15000000000000002
log2_hidden_dim_multiplier = 1
normalization = "Identity"
log2_n_heads = 1
sep = false
