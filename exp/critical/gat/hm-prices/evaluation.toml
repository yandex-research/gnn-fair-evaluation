function = "bin.critical.main"
n_seeds = 5

[base_config]
n_steps = 3000
patience = 1000
save_checkpoint = false

[base_config.optimizer]
type = "AdamW"
lr = 0.00035073841711142696
weight_decay = 0.0021698113336480317

[base_config.data]
path = "data/hm-prices"
setting = "transductive"
internal_split_name = "RL"

[base_config.transform]
seed = 0
labels = true

[base_config.transform.features]
num_policy = "quantile-normal"
cat_policy = "one-hot"
impute_first = true

[base_config.model.backbone]
conv = "gat"
n_blocks = 3
d_hidden = 320
dropout = 0.05
log2_hidden_dim_multiplier = 0
normalization = "BatchNorm"
log2_n_heads = 3
sep = true
